<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container mt-5">

<h3 class="mb-4 text-center">Registro de Membresía</h3>

<form class="row g-3">

<!-- Email -->
<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email">
</div>

<!-- Password -->
<div class="col-md-6">
<label class="form-label">Contraseña</label>
<input type="password" class="form-control" id="password">
</div>

<!-- Dirección -->
<div class="col-12">
<label class="form-label">Dirección</label>
<input type="text" class="form-control" id="direccion"
placeholder="Ingrese su dirección completa">
</div>

<!-- Titular -->
<div class="col-12">
<label class="form-label">Nombre del Titular</label>
<input type="text" class="form-control" id="titular">
</div>

<!-- Adicional -->
<div class="col-md-6">
<label class="form-label">Nombre del Adicional</label>
<input type="text" class="form-control" id="adicional">
</div>

<!-- Paquetes -->
<div class="col-md-3">
  <label class="form-label">Plan seleccionado</label>

  <div class="form-control bg-dark text-white fw-bold">
    <span id="planSeleccionado">Cargando...</span>
  </div>
  <input type="hidden" id="planInput" name="plan">
</div>

<!-- Tipo tarjeta -->
<div class="col-md-3">
<label class="form-label">Tipo de tarjeta</label>
<select id="tipoTarjeta" class="form-select">
<option selected></option>
<option>Visa</option>
<option>MasterCard</option>
<option>American Express</option>
</select>
</div>

<!-- Número tarjeta -->
<div class="col-md-6">
<label class="form-label">Número de tarjeta</label>
<input type="text" class="form-control" id="numeroTarjeta">
</div>

<!-- Vencimiento -->
<div class="col-md-4">
<label class="form-label">Fecha de Vencimiento</label>
<input type="text" class="form-control" id="vencimiento"
placeholder="MM/AA">
</div>

<!-- CVV -->
<div class="col-md-2">
<label class="form-label">CVV</label>
<input type="text" class="form-control" id="cvv">
</div>

<!-- Promos -->
<div class="col-12">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="promos">
<label class="form-check-label">
Recibir promociones
</label>
</div>
</div>

<!-- Botones -->
<div class="col-12 d-flex gap-2">
<button type="button" class="btn btn-primary"
onclick="pagar()">Pagar ahora</button>

<a href="index.html" class="btn btn-secondary">Regresar</a>
</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="registro.js"></script>

</body>
</html>
